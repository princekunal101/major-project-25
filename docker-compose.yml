version: '3.9'

services:
  gateway:
    build: ./gateway-service
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      
  auth:
    build: ./auth-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001

  profile:
    build: ./profile-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002

  community:
    build: ./community-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003

  post:
    build: ./post-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004

  interaction:
    build: ./interaction-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
